<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taskboard</title>
<meta name="theme-color" content="#1a1612">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Taskboard">
<link rel="icon" href="./icon.svg">
<link rel="apple-touch-icon" href="./icon.svg">
<link rel="manifest" href="./manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #f5f0e8;
    --cream2: #ede7d9;
    --ink: #1a1612;
    --muted: #9a8f85;
    --rust: #c0482a;
    --rust-soft: rgba(192,72,42,0.1);
    --sage: #4a7c59;
    --border: #d4c9bb;
    --radius: 4px;
  }

  body {
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── TOP BAR ── */
  .topbar {
    border-bottom: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 44px;
    height: 62px;
    flex-shrink: 0;
  }

  .wordmark {
    font-family: 'DM Serif Display', Georgia, serif;
    font-size: 1.45rem;
    letter-spacing: -0.5px;
  }
  .wordmark em { font-style: italic; color: var(--rust); }

  .tab-strip {
    display: flex;
    gap: 2px;
    background: var(--cream2);
    border: 1.5px solid var(--border);
    border-radius: 6px;
    padding: 3px;
  }

  .tab {
    padding: 6px 22px;
    border-radius: 4px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
    letter-spacing: 0.2px;
  }
  .tab:hover { color: var(--ink); }
  .tab.active { background: var(--ink); color: var(--cream); }

  .date-label {
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* ── PAGES ── */
  .page { display: none; flex: 1; flex-direction: column; }
  .page.active { display: flex; }

  /* ── ADD PAGE ── */
  .add-page {
    align-items: center;
    justify-content: center;
    padding: 60px 24px;
  }

  .add-card {
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 44px 48px;
    width: 100%;
    max-width: 520px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.06);
  }

  .add-heading {
    font-family: 'DM Serif Display', Georgia, serif;
    font-size: 2rem;
    letter-spacing: -0.5px;
    line-height: 1.1;
    margin-bottom: 6px;
  }
  .add-heading em { font-style: italic; color: var(--rust); }

  .add-sub {
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 32px;
  }

  .field { margin-bottom: 18px; }

  .field label {
    display: block;
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 7px;
  }

  input[type="text"], textarea {
    width: 100%;
    background: var(--cream);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 11px 14px;
    color: var(--ink);
    font-size: 0.92rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s, background 0.15s;
    resize: none;
  }

  input[type="text"]:focus,
  textarea:focus {
    border-color: var(--ink);
    background: #fff;
  }

  textarea { height: 80px; }

  .btn-add {
    width: 100%;
    padding: 13px;
    border-radius: var(--radius);
    border: none;
    background: var(--ink);
    color: var(--cream);
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    transition: all 0.15s;
    margin-top: 8px;
  }
  .btn-add:hover { background: var(--rust); }
  .btn-add:active { transform: scale(0.99); }

  .toast {
    display: none;
    margin-top: 16px;
    text-align: center;
    font-size: 0.82rem;
    color: var(--sage);
    font-weight: 500;
  }

  /* ── TASKS PAGE ── */
  .tasks-page {
    flex-direction: column;
    overflow: hidden;
  }

  .tasks-header {
    padding: 36px 44px 28px;
    border-bottom: 1.5px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }

  .remaining-num {
    font-family: 'DM Serif Display', Georgia, serif;
    font-size: 4rem;
    line-height: 1;
    letter-spacing: -2px;
    color: var(--ink);
  }

  .remaining-label {
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-top: 4px;
  }

  .header-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 10px;
  }

  .search-wrap { position: relative; }

  .search-wrap input {
    width: 210px;
    padding: 9px 14px 9px 34px;
    border-radius: 20px;
    font-size: 0.83rem;
  }

  .search-wrap::before {
    content: '↳';
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 0.85rem;
    pointer-events: none;
  }

  .progress-row {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 210px;
  }

  .progress-track {
    flex: 1;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--ink);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .progress-pct {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--muted);
    width: 30px;
    text-align: right;
    flex-shrink: 0;
  }

  /* ── Task list ── */
  .task-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 32px 44px 44px;
  }

  .section-head {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }

  .section-head + .section-head,
  .section-divider { margin-top: 36px; }

  .section-name {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
  }

  .section-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .section-count {
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--muted);
  }

  .task-list { display: flex; flex-direction: column; gap: 8px; }

  .task-card {
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 11px;
    transition: box-shadow 0.15s, border-color 0.15s, opacity 0.15s;
    animation: popIn 0.2s ease;
    position: relative;
  }

  @keyframes popIn {
    from { opacity: 0; transform: translateY(-5px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .task-card:hover {
    box-shadow: 0 3px 18px rgba(0,0,0,0.07);
    border-color: #b8ad9f;
  }

  .task-card[draggable="true"] { cursor: grab; }
  .task-card.dragging { opacity: 0.35; cursor: grabbing; }
  .task-card.drop-above { box-shadow: 0 -3px 0 var(--rust); }
  .task-card.drop-below { box-shadow: 0 3px 0 var(--rust); }

  .task-card.done {
    opacity: 0.5;
    background: var(--cream2);
    cursor: default;
  }
  .task-card.done .card-title { text-decoration: line-through; color: var(--muted); }

  /* drag handle (visual cue — whole card is the drag target) */
  .drag-handle {
    width: 12px;
    align-self: stretch;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--border);
    font-size: 1.05rem;
    line-height: 0.55;
    letter-spacing: -2px;
    flex-shrink: 0;
    user-select: none;
    transition: color 0.15s;
  }
  .task-card:hover .drag-handle { color: var(--muted); }

  /* number badge (click to jump position) */
  .task-num {
    min-width: 30px;
    height: 26px;
    padding: 0 7px;
    border-radius: 4px;
    background: var(--cream);
    border: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--muted);
    flex-shrink: 0;
    cursor: text;
    transition: all 0.15s;
    font-family: inherit;
  }
  .task-num:hover { border-color: var(--ink); color: var(--ink); background: #fff; }

  .task-num-input {
    min-width: 30px;
    width: 44px;
    height: 26px;
    border-radius: 4px;
    background: #fff;
    border: 1.5px solid var(--ink);
    color: var(--ink);
    font-size: 0.78rem;
    font-weight: 700;
    text-align: center;
    font-family: inherit;
    outline: none;
    flex-shrink: 0;
    padding: 0;
    -moz-appearance: textfield;
  }
  .task-num-input::-webkit-inner-spin-button,
  .task-num-input::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }

  .check-btn {
    width: 21px; height: 21px;
    border-radius: 3px;
    border: 1.5px solid var(--border);
    background: transparent;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.65rem;
    color: transparent;
    transition: all 0.15s;
  }
  .check-btn:hover { border-color: var(--ink); }

  .task-card.done .check-btn {
    background: var(--ink);
    border-color: var(--ink);
    color: var(--cream);
  }

  .card-body { flex: 1; min-width: 0; }

  .card-title {
    font-size: 0.93rem;
    font-weight: 500;
    line-height: 1.4;
    word-break: break-word;
    color: var(--ink);
  }

  .card-note {
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 4px;
    line-height: 1.5;
  }

  .del-btn {
    background: transparent;
    border: none;
    color: var(--border);
    cursor: pointer;
    font-size: 0.8rem;
    padding: 3px 5px;
    border-radius: 3px;
    opacity: 0;
    transition: all 0.15s;
    flex-shrink: 0;
    line-height: 1;
  }

  .task-card:hover .del-btn { opacity: 1; }
  .del-btn:hover { color: var(--rust); background: var(--rust-soft); }

  .empty {
    padding: 80px 0;
    text-align: center;
    color: var(--muted);
    font-size: 0.9rem;
    border: 1.5px dashed var(--border);
    border-radius: 6px;
  }

  .empty-glyph {
    font-family: 'DM Serif Display', Georgia, serif;
    font-style: italic;
    font-size: 2.5rem;
    color: var(--border);
    display: block;
    margin-bottom: 10px;
  }

  .hint {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 14px;
    text-align: center;
    font-style: italic;
  }

  /* Scrollbar */
  .task-scroll::-webkit-scrollbar { width: 5px; }
  .task-scroll::-webkit-scrollbar-track { background: transparent; }
  .task-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 620px) {
    .topbar, .tasks-header, .task-scroll { padding-left: 22px; padding-right: 22px; }
    .add-card { padding: 32px 24px; }
    .remaining-num { font-size: 3rem; }
    .search-wrap input, .progress-row { width: 100%; }
    .header-right { width: 100%; align-items: flex-start; }
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="wordmark">Task<em>board</em></div>
  <div class="tab-strip">
    <button class="tab active" data-page="add">Add Task</button>
    <button class="tab" data-page="tasks">My Tasks</button>
  </div>
  <div class="date-label" id="dateLabel"></div>
</header>

<!-- ADD PAGE -->
<div class="page add-page active" id="page-add">
  <div class="add-card">
    <div class="add-heading">What needs<br><em>doing?</em></div>
    <div class="add-sub">Add a task and get it off your mind.</div>

    <div class="field">
      <label>Task</label>
      <input type="text" id="inputTitle" placeholder="e.g. Finish quarterly report" />
    </div>

    <div class="field">
      <label>Note <span style="font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></label>
      <textarea id="inputNote" placeholder="Any extra details..."></textarea>
    </div>

    <button class="btn-add" id="btnAdd">Add Task →</button>
    <div class="toast" id="toast">Task added ✓</div>
  </div>
</div>

<!-- TASKS PAGE -->
<div class="page tasks-page" id="page-tasks">
  <div class="tasks-header">
    <div class="remaining-block">
      <div class="remaining-num" id="remainingNum">0</div>
      <div class="remaining-label">Remaining Tasks</div>
    </div>
    <div class="header-right">
      <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="Search tasks..." />
      </div>
      <div class="progress-row">
        <div class="progress-track">
          <div class="progress-fill" id="progressFill" style="width:0%"></div>
        </div>
        <div class="progress-pct" id="progressPct">0%</div>
      </div>
    </div>
  </div>

  <div class="task-scroll" id="taskScroll">
    <!-- rendered by JS -->
  </div>
</div>

<script>
  // Register service worker — required for Chrome's address-bar install icon
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    });
  }

  let tasks = JSON.parse(localStorage.getItem('taskboard-v3') || '[]');
  // Strip legacy 'priority' field from any pre-existing tasks
  tasks.forEach(t => { delete t.priority; });

  let searchQuery = '';
  let dragId = null;

  // Date
  document.getElementById('dateLabel').textContent = new Date().toLocaleDateString('en-US', {
    weekday: 'short', month: 'short', day: 'numeric'
  });

  // Page switching
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      const page = tab.dataset.page;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById('page-' + page).classList.add('active');
      if (page === 'tasks') render();
    });
  });

  // Search
  document.getElementById('searchInput').addEventListener('input', e => {
    searchQuery = e.target.value.toLowerCase();
    render();
  });

  // Add task
  document.getElementById('btnAdd').addEventListener('click', addTask);
  document.getElementById('inputTitle').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  function addTask() {
    const titleEl = document.getElementById('inputTitle');
    const title = titleEl.value.trim();
    if (!title) {
      titleEl.style.borderColor = 'var(--rust)';
      titleEl.focus();
      setTimeout(() => titleEl.style.borderColor = '', 700);
      return;
    }

    // New task goes to top of active list
    tasks.unshift({
      id: Date.now(),
      title,
      note: document.getElementById('inputNote').value.trim(),
      done: false
    });

    titleEl.value = '';
    document.getElementById('inputNote').value = '';
    save();
    render();

    const toast = document.getElementById('toast');
    toast.style.display = 'block';
    setTimeout(() => toast.style.display = 'none', 2000);
  }

  function toggle(id) {
    const t = tasks.find(x => x.id === id);
    if (!t) return;
    t.done = !t.done;
    // Re-segment so the array is always [active...done...]
    tasks = [...tasks.filter(x => !x.done), ...tasks.filter(x => x.done)];
    save();
    render();
  }

  function remove(id) {
    tasks = tasks.filter(t => t.id !== id);
    save();
    render();
  }

  // Move active task `fromId` to a slot adjacent to `toId`.
  // `placeAfter` = true means insert AFTER toId; false means BEFORE.
  function reorderActive(fromId, toId, placeAfter) {
    const active = tasks.filter(t => !t.done);
    const done   = tasks.filter(t => t.done);
    const fromIdx = active.findIndex(t => t.id === fromId);
    if (fromIdx === -1) return;
    const [moved] = active.splice(fromIdx, 1);

    let toIdx = active.findIndex(t => t.id === toId);
    if (toIdx === -1) toIdx = active.length;
    if (placeAfter) toIdx += 1;
    active.splice(toIdx, 0, moved);

    tasks = [...active, ...done];
    save();
    render();
  }

  // Move active task to a given 1-indexed position within the active list.
  function setActivePosition(taskId, targetPos) {
    const active = tasks.filter(t => !t.done);
    const done   = tasks.filter(t => t.done);
    const idx    = active.findIndex(t => t.id === taskId);
    if (idx === -1) return;

    const [moved] = active.splice(idx, 1);
    if (targetPos < 1) targetPos = 1;
    if (targetPos > active.length + 1) targetPos = active.length + 1;
    active.splice(targetPos - 1, 0, moved);

    tasks = [...active, ...done];
    save();
    render();
  }

  function save() { localStorage.setItem('taskboard-v3', JSON.stringify(tasks)); }

  function render() {
    const filtered = tasks.filter(t =>
      !searchQuery ||
      t.title.toLowerCase().includes(searchQuery) ||
      (t.note && t.note.toLowerCase().includes(searchQuery))
    );

    const active = filtered.filter(t => !t.done);
    const done   = filtered.filter(t => t.done);
    const total  = tasks.length;
    const doneCount = tasks.filter(t => t.done).length;
    const remaining = total - doneCount;
    const pct = total ? Math.round(doneCount / total * 100) : 0;

    document.getElementById('remainingNum').textContent = remaining;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressPct').textContent = pct + '%';

    const scroll = document.getElementById('taskScroll');

    if (filtered.length === 0) {
      scroll.innerHTML = `<div class="empty"><span class="empty-glyph">∅</span>${searchQuery ? 'No tasks match your search.' : "You're all clear. Add something!"}</div>`;
      return;
    }

    let html = '';

    if (active.length > 0) {
      html += `<div class="section-head">
        <span class="section-name">To Do</span>
        <span class="section-line"></span>
        <span class="section-count">${active.length}</span>
      </div>
      <div class="task-list">`;
      active.forEach((t, i) => html += cardHTML(t, i + 1, true));
      html += `</div>
      <div class="hint">Drag a row to reorder, or click its number to jump it to a new position.</div>`;
    } else if (!searchQuery) {
      html += `<div class="empty"><span class="empty-glyph">✓</span>All done — nice work!</div>`;
    }

    if (done.length > 0) {
      html += `<div class="section-head ${active.length ? 'section-divider' : ''}">
        <span class="section-name">Completed</span>
        <span class="section-line"></span>
        <span class="section-count">${done.length}</span>
      </div>
      <div class="task-list">`;
      done.forEach(t => html += cardHTML(t, null, false));
      html += `</div>`;
    }

    scroll.innerHTML = html;

    scroll.querySelectorAll('.check-btn').forEach(b =>
      b.addEventListener('click', e => { e.stopPropagation(); toggle(+b.dataset.id); }));
    scroll.querySelectorAll('.del-btn').forEach(b =>
      b.addEventListener('click', e => { e.stopPropagation(); remove(+b.dataset.id); }));

    attachReorderHandlers(scroll);
  }

  function cardHTML(t, num, draggable) {
    const handle  = `<span class="drag-handle"${draggable ? '' : ' style="visibility:hidden"'}>⋮⋮</span>`;
    const numHTML = (num != null)
      ? `<span class="task-num" data-id="${t.id}" title="Click to change position">${num}</span>`
      : `<span class="task-num" style="visibility:hidden">·</span>`;
    return `
      <div class="task-card ${t.done ? 'done' : ''}" data-id="${t.id}" data-draggable="${draggable ? 1 : 0}">
        ${handle}
        ${numHTML}
        <button class="check-btn" data-id="${t.id}">✓</button>
        <div class="card-body">
          <div class="card-title">${esc(t.title)}</div>
          ${t.note ? `<div class="card-note">${esc(t.note)}</div>` : ''}
        </div>
        <button class="del-btn" data-id="${t.id}">✕</button>
      </div>`;
  }

  function attachReorderHandlers(scroll) {
    // Click-to-edit number badges
    scroll.querySelectorAll('.task-num[data-id]').forEach(span => {
      span.addEventListener('click', () => editNumber(span));
    });

    // Drag-and-drop on active cards
    const cards = scroll.querySelectorAll('.task-card[data-draggable="1"]');

    cards.forEach(card => {
      const taskId = +card.dataset.id;
      card.setAttribute('draggable', 'true');

      card.addEventListener('dragstart', e => {
        dragId = taskId;
        card.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        try { e.dataTransfer.setData('text/plain', String(taskId)); } catch (_) {}
      });

      card.addEventListener('dragend', () => {
        dragId = null;
        document.querySelectorAll('.task-card').forEach(c =>
          c.classList.remove('dragging', 'drop-above', 'drop-below'));
      });

      card.addEventListener('dragover', e => {
        if (dragId == null || taskId === dragId) return;
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        const rect = card.getBoundingClientRect();
        const above = (e.clientY - rect.top) < rect.height / 2;
        card.classList.toggle('drop-above', above);
        card.classList.toggle('drop-below', !above);
      });

      card.addEventListener('dragleave', () => {
        card.classList.remove('drop-above', 'drop-below');
      });

      card.addEventListener('drop', e => {
        e.preventDefault();
        if (dragId == null || taskId === dragId) return;
        const placeAfter = card.classList.contains('drop-below');
        const from = dragId;
        card.classList.remove('drop-above', 'drop-below');
        reorderActive(from, taskId, placeAfter);
      });
    });
  }

  function editNumber(span) {
    const taskId = +span.dataset.id;
    const currentNum = parseInt(span.textContent, 10);
    const card = span.closest('.task-card');
    // Don't let drag start while editing
    if (card) card.removeAttribute('draggable');

    const input = document.createElement('input');
    input.type = 'number';
    input.min = '1';
    input.value = currentNum;
    input.className = 'task-num-input';
    span.replaceWith(input);
    input.focus();
    input.select();

    let done = false;
    const commit = () => {
      if (done) return;
      done = true;
      const v = parseInt(input.value, 10);
      if (Number.isFinite(v) && v > 0 && v !== currentNum) {
        setActivePosition(taskId, v);
      } else {
        render();
      }
    };
    const cancel = () => { if (!done) { done = true; render(); } };

    input.addEventListener('blur', commit);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
      else if (e.key === 'Escape') { cancel(); }
    });
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  render();
</script>
</body>
</html>
